<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Respiração Diafragmática</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="src/clovers.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
<div id="overlay" class="overlay" onclick="fecharAjuda()">
    <div class="janela-ajuda" onclick="event.stopPropagation()">
      <button class="x" onclick="fecharAjuda()">✖</button>
        <h2>Ajuda</h2>
        <p> Inspire quando a flor crescer.</p>
        <p> Expire quando ela diminuir. </p>
        <img src="src/instructions.png"></div>
    </div>
</div>

  <div class="clover-container">
    <div id="clover" class="clover pequeno"></div>
  </div>

  <button class="help" onclick="abrirAjuda()">?</button>

  <div id="fase">Pressione para Iniciar</div>
  <br>
  <button id="pp" onclick="comecar()">▶</button>

  <div id="select">
    <div class="r">
      <button onclick="modo(0)"><h5>Rapido</h5></button>
    </div>
    <div class="l">
      <button onclick="modo(1)"><h5>Leve</h5></button>
    </div>
    <div class="p">
      <button onclick="modo()"><h5>Profundo</h5></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
