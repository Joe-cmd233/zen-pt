<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiração Diafragmática</title>

    <link rel="icon" href="src/clovers.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- AJUDA -->

    <div
        id="overlay"
        class="overlay"
        onclick="fecharAjuda()"
    >
        <div
            class="janela-ajuda"
            onclick="event.stopPropagation()"
        >

            <button
                class="x"
                onclick="fecharAjuda()"
            >
                ✖
            </button>

            <h2>Ajuda</h2>

            <p>
                Inspire quando a flor crescer.
            </p>

            <p>
                Expire quando a flor diminuir.
            </p>

            <img
                src="src/instructions.png"
                alt="Instruções"
            >

        </div>
    </div>

    <!-- MODOS -->

    <div
        id="overlayModos"
        class="overlay"
        onclick="fecharModos()"
    >
        <div
            class="janela-ajuda"
            onclick="event.stopPropagation()"
        >

            <button
                class="x"
                onclick="fecharModos()"
            >
                ✖
            </button>

            <h2>
                Modos de Respiração
            </h2>

            <div id="select">

                <div class="r">
                    <button onclick="modo(0)">
                        <h5>Rápido</h5>
                    </button>
                </div>

                <div class="l">
                    <button onclick="modo(1)">
                        <h5>Leve</h5>
                    </button>
                </div>

                <div class="p">
                    <button onclick="modo(2)">
                        <h5>Profundo</h5>
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- APP -->

    <div class="app">

        <button
            class="help"
            onclick="abrirAjuda()"
        >
            ?
        </button>

        <div class="clover-container">
            <div
                id="clover"
                class="clover"
            ></div>
        </div>

        <div id="fase">
            Pressione para Iniciar
        </div>

        <div class="botoes">

            <button
                id="pp"
                onclick="comecar()"
            >
                ▶
            </button>

            <button
                onclick="abrirModos()"
            >
                ⚙️ Modos
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
